<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelPlanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo">FreshPlan</div>
    </header>

    <main class="app-container">
        <section class="config-area">
            <div class="glass-card">
                <h3 class="section-title">Destinations</h3>
                <div class="input-row">
                    <select id="destination-select" class="custom-select">
                        <option value="" disabled selected>Where are we going?</option>
                        <option value="Paris" data-price="1200">Paris, France ($1200)</option>
                        <option value="Tokyo" data-price="1500">Tokyo, Japan ($1500)</option>
                        <option value="Bali" data-price="800">Bali, Indonesia ($800)</option>
                        <option value="Rome" data-price="1100">Rome, Italy ($1100)</option>
                    </select>
                    <button id="add-destination" class="btn-add">Add</button>
                </div>
            </div>

            <div class="glass-card">
                <h3 class="section-title">Trip Duration</h3>
                <div class="date-grid">
                    <div class="field">
                        <label>Start Date</label>
                        <input type="date" id="start-date" class="custom-input">
                    </div>
                    <div class="field">
                        <label>End Date</label>
                        <input type="date" id="end-date" class="custom-input">
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <h3 class="section-title">Top Activities</h3>
                <div class="chip-container">
                    <label class="chip">
                        <input type="checkbox" class="activity" value="Museums" data-price="100">
                        <span>🏛️ Museums ($100)</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="activity" value="Nightlife" data-price="200">
                        <span>🍸 Nightlife ($200)</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="activity" value="Surfing" data-price="150">
                        <span>🏄 Surfing ($150)</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="activity" value="Photoshoot" data-price="50">
                        <span>📸 Photos ($50)</span>
                    </label>
                </div>
            </div>
        </section>

        <aside class="summary-area">
            <div class="summary-card">
                <h3 class="summary-title">Your Trip</h3>
                <div class="summary-item">
                    <span class="label">Timeline</span>
                    <p id="display-dates" class="val">Not selected</p>
                </div>
                <div class="summary-item">
                    <span class="label">Itinerary</span>
                    <ul id="destination-list" class="list"></ul>
                </div>
                <div class="summary-item">
                    <span class="label">Extras</span>
                    <ul id="activity-list" class="list"></ul>
                </div>
                <div class="total-section">
                    <span class="total-label">Estimated Cost</span>
                    <div id="total-budget" class="total-amount">$0</div>
                </div>
                <button class="btn-confirm">Confirm Trip</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>

</html>
